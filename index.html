<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reyi-EP — 員工登入</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="js/store-name-init.js"></script>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>🛒 <span class="store-name-el"></span></h1>
      <p>員工專用平台</p>
    </div>

    <div id="alert-box"></div>

    <div class="form-group">
      <label class="form-label">員工編號</label>
      <input id="emp-id" type="text" class="form-input" placeholder="請輸入員工編號"
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()" id="btn-login">登入</button>

    <div style="margin-top:1.5rem;display:flex;align-items:center;justify-content:flex-end">
      <a href="admin-login.html" style="font-size:.78rem;color:var(--muted);text-decoration:none"
         onmouseover="this.style.color='#1d1d1f'" onmouseout="this.style.color='var(--muted)'">管理員登入 →</a>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyByVQewloZcL4cMrPKxyZ5JlhaGS4Zep08",
  authDomain: "reyi-ep.firebaseapp.com",
  projectId: "reyi-ep",
  storageBucket: "reyi-ep.firebasestorage.app",
  messagingSenderId: "90799325656",
  appId: "1:90799325656:web:df2ce64d86ef9c9060b2ad"
};
firebase.initializeApp(firebaseConfig);
</script>
<script src="js/app-helpers.js"></script>
<script>
applyStoreName('');

auth.onAuthStateChanged(user => {
  if (user) window.location.href = 'shop.html';
});

function showAlert(msg, type = 'error') {
  document.getElementById('alert-box').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}

async function doLogin() {
  const empId = document.getElementById('emp-id').value.trim().toUpperCase();
  if (!empId) return showAlert('請輸入員工編號');
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = '登入中...';
  const email = empId + '@reyi-ep.local';
  const password = 'Reyi@' + empId;
  try {
    // 先查 Firestore 確認員工存在
    const empDoc = await db.collection('employees').doc(empId).get();
    if (!empDoc.exists) {
      showAlert('員工編號不存在，請聯絡管理員');
      btn.disabled = false; btn.textContent = '登入';
      return;
    }
    if (empDoc.data().isActive === false) {
      showAlert('您的帳號已停用，請聯絡管理員');
      btn.disabled = false; btn.textContent = '登入';
      return;
    }

    let result;
    try {
      result = await auth.signInWithEmailAndPassword(email, password);
    } catch(signInErr) {
      // 帳號尚未建立，建立 Firebase Auth 帳號
      try {
        result = await auth.createUserWithEmailAndPassword(email, password);
        await result.user.updateProfile({ displayName: empDoc.data().name || empId });
        await db.collection('employees').doc(empId).update({ uid: result.user.uid }).catch(() => {});
      } catch(createErr) {
        if (createErr.code === 'auth/email-already-in-use') {
          // 帳號已存在但剛才 signIn 失敗（Firebase 統一錯誤碼），重試
          result = await auth.signInWithEmailAndPassword(email, password);
        } else {
          throw createErr;
        }
      }
    }

    // 記錄登入
    await db.collection('users').doc(result.user.uid).set({
      loginCount: firebase.firestore.FieldValue.increment(1),
      lastLoginAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true }).catch(() => {});

  } catch(e) {
    const msg = e.code === 'auth/too-many-requests' ? '嘗試次數過多，請稍後再試' : '登入失敗，請稍後再試';
    showAlert(msg);
    btn.disabled = false; btn.textContent = '登入';
  }
}
</script>
</body>
</html>
