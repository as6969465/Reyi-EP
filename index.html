<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reyi-EP — 員工登入</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="js/store-name-init.js"></script>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>🛒 <span class="store-name-el"></span></h1>
      <p>員工專用平台</p>
    </div>

    <div id="alert-box"></div>

    <div class="form-group">
      <label class="form-label">員工編號</label>
      <input id="emp-id" type="text" class="form-input" placeholder="請輸入員工編號"
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()" id="btn-login">登入</button>

    <div style="margin-top:1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem">
      <div style="display:flex;align-items:center;gap:1rem">
        <a id="social-line-btn" href="#" target="_blank" rel="noopener"
           style="display:none;line-height:0;opacity:.75;transition:opacity .15s"
           onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.75" aria-label="LINE">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="color:#06c755;display:block"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
        </a>
        <a id="social-ig-btn" href="#" target="_blank" rel="noopener"
           style="display:none;line-height:0;opacity:.75;transition:opacity .15s"
           onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.75" aria-label="Instagram">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="color:#e1306c;display:block"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
        </a>
      </div>
      <a href="admin-login.html" style="font-size:.78rem;color:var(--muted);text-decoration:none"
         onmouseover="this.style.color='#1d1d1f'" onmouseout="this.style.color='var(--muted)'">管理員登入 →</a>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyByVQewloZcL4cMrPKxyZ5JlhaGS4Zep08",
  authDomain: "reyi-ep.firebaseapp.com",
  projectId: "reyi-ep",
  storageBucket: "reyi-ep.firebasestorage.app",
  messagingSenderId: "90799325656",
  appId: "1:90799325656:web:df2ce64d86ef9c9060b2ad"
};
firebase.initializeApp(firebaseConfig);
</script>
<script src="js/app-helpers.js"></script>
<script>
db.collection('settings').doc('general').get().then(snap => {
  if (!snap.exists) return;
  const s = snap.data().socialLinks || {};
  if (s.line) { const el = document.getElementById('social-line-btn'); el.href = s.line; el.style.display = ''; }
  if (s.instagram) { const el = document.getElementById('social-ig-btn'); el.href = s.instagram; el.style.display = ''; }
}).catch(() => {});

applyStoreName('');

auth.onAuthStateChanged(user => {
  if (user) window.location.href = 'shop.html';
});

function showAlert(msg, type = 'error') {
  document.getElementById('alert-box').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}

async function doLogin() {
  const empId = document.getElementById('emp-id').value.trim().toUpperCase();
  if (!empId) return showAlert('請輸入員工編號');
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = '登入中...';
  const email = empId + '@reyi-ep.local';
  const password = 'Reyi@' + empId;
  try {
    // 先查 Firestore 確認員工存在
    const empDoc = await db.collection('employees').doc(empId).get();
    if (!empDoc.exists) {
      showAlert('員工編號不存在，請聯絡管理員');
      btn.disabled = false; btn.textContent = '登入';
      return;
    }
    if (empDoc.data().isActive === false) {
      showAlert('您的帳號已停用，請聯絡管理員');
      btn.disabled = false; btn.textContent = '登入';
      return;
    }

    let result;
    try {
      result = await auth.signInWithEmailAndPassword(email, password);
    } catch(signInErr) {
      // 帳號尚未建立，建立 Firebase Auth 帳號
      try {
        result = await auth.createUserWithEmailAndPassword(email, password);
        await result.user.updateProfile({ displayName: empDoc.data().name || empId });
        await db.collection('employees').doc(empId).update({ uid: result.user.uid }).catch(() => {});
      } catch(createErr) {
        if (createErr.code === 'auth/email-already-in-use') {
          // 帳號已存在但剛才 signIn 失敗（Firebase 統一錯誤碼），重試
          result = await auth.signInWithEmailAndPassword(email, password);
        } else {
          throw createErr;
        }
      }
    }

    // 記錄登入
    await db.collection('users').doc(result.user.uid).set({
      loginCount: firebase.firestore.FieldValue.increment(1),
      lastLoginAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true }).catch(() => {});

  } catch(e) {
    const msg = e.code === 'auth/too-many-requests' ? '嘗試次數過多，請稍後再試' : '登入失敗，請稍後再試';
    showAlert(msg);
    btn.disabled = false; btn.textContent = '登入';
  }
}
</script>
</body>
</html>
