<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂單確認 — Reyi-EP</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
body{background:var(--bg);min-height:100vh}
.top-bar{background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid rgba(210,210,215,.6);padding:.8rem 1.25rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100}
.top-bar-back{font-size:.85rem;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:.35rem;transition:color .15s}
.top-bar-back:hover{color:#1d1d1f}
.top-bar-title{font-weight:700;font-size:1rem;flex:1}
.emp-row{display:flex;gap:.5rem;padding:.5rem 0;border-bottom:1px solid var(--border);align-items:baseline}
.emp-row:last-child{border-bottom:none}
.emp-label{font-size:.8rem;color:var(--muted);width:80px;flex-shrink:0}
.emp-val{font-weight:600;font-size:.93rem}
.item-row{display:flex;align-items:center;gap:.75rem;padding:.65rem 0;border-bottom:1px solid var(--border)}
.item-row:last-child{border-bottom:none}
.item-img{width:48px;height:48px;border-radius:8px;background:#f5f5f7;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1rem}
.item-img img{width:100%;height:100%;object-fit:cover}
.pay-btn{width:100%;padding:1rem;font-size:1.05rem;font-weight:700;background:#30d158;color:#fff;border:none;border-radius:14px;cursor:pointer;transition:opacity .15s;letter-spacing:.02em}
.pay-btn:hover{opacity:.88}
.pay-btn:disabled{opacity:.5;cursor:not-allowed}
.paid-badge{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:1.1rem;background:rgba(48,209,88,.1);border:2px solid #30d158;border-radius:14px;color:#1c7a3a;font-weight:700;font-size:1.05rem}
.status-pill{display:inline-flex;align-items:center;padding:.25rem .75rem;border-radius:99px;font-size:.78rem;font-weight:700}
.status-pending{background:#fff3cd;color:#856404}
.status-paid{background:#d1f2e1;color:#1c7a3a}
.status-cancelled{background:#f1f3f5;color:#6e6e73}
  </style>
  <style>body{visibility:hidden}</style>
  <script src="../js/store-name-init.js"></script>
</head>
<body>

<div class="top-bar">
  <a href="orders.html" class="top-bar-back">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="10,3 5,8 10,13"/></svg>
    訂單列表
  </a>
  <span class="top-bar-title">訂單確認</span>
  <span id="header-status"></span>
</div>

<div style="max-width:500px;margin:0 auto;padding:1.25rem">

  <!-- 載入中 -->
  <div id="state-loading" style="text-align:center;padding:4rem 0;color:var(--muted)">
    <div style="font-size:2rem;margin-bottom:.75rem">⏳</div>
    <div>載入訂單中...</div>
  </div>

  <!-- 錯誤 -->
  <div id="state-error" style="display:none;text-align:center;padding:4rem 0">
    <div style="font-size:2.5rem;margin-bottom:.75rem">⚠️</div>
    <div id="error-msg" style="color:var(--danger);font-weight:600"></div>
    <a href="orders.html" class="btn btn-outline" style="margin-top:1.5rem">返回訂單列表</a>
  </div>

  <!-- 訂單內容 -->
  <div id="state-content" style="display:none">

    <!-- 員工資訊 -->
    <div class="card" style="margin-bottom:1rem">
      <h3 style="font-weight:700;margin-bottom:.75rem">員工資訊</h3>
      <div class="emp-row"><span class="emp-label">廠商</span><span class="emp-val" id="o-dept"></span></div>
      <div class="emp-row"><span class="emp-label">姓名</span><span class="emp-val" id="o-name"></span></div>
      <div class="emp-row"><span class="emp-label">員工編號</span><span class="emp-val" id="o-empid"></span></div>
      <div class="emp-row"><span class="emp-label">下單時間</span><span class="emp-val" id="o-time" style="font-weight:400;font-size:.85rem"></span></div>
    </div>

    <!-- 購買商品 -->
    <div class="card" style="margin-bottom:1rem">
      <h3 style="font-weight:700;margin-bottom:.75rem">購買商品</h3>
      <div id="o-items"></div>
    </div>

    <!-- 合計 -->
    <div class="card summary-box" style="margin-bottom:1.25rem">
      <div class="summary-row total"><span>商品合計</span><span id="o-total"></span></div>
    </div>

    <!-- 確認付款 / 已付款 -->
    <div id="action-pending" style="display:none">
      <button class="pay-btn" onclick="confirmPayment()" id="btn-pay">✅ &nbsp;確認付款</button>
    </div>
    <div id="action-paid" class="paid-badge" style="display:none">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,10 8,14 16,6"/></svg>
      已確認付款
    </div>
    <div id="action-cancelled" style="display:none;text-align:center;color:var(--muted);padding:1rem;font-size:.9rem">此訂單已取消</div>

    <p style="text-align:center;font-size:.75rem;color:var(--muted);margin-top:1rem" id="o-orderid"></p>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyByVQewloZcL4cMrPKxyZ5JlhaGS4Zep08",
  authDomain: "reyi-ep.firebaseapp.com",
  projectId: "reyi-ep",
  storageBucket: "reyi-ep.firebasestorage.app",
  messagingSenderId: "90799325656",
  appId: "1:90799325656:web:df2ce64d86ef9c9060b2ad"
};
firebase.initializeApp(firebaseConfig);
</script>
<script src="../js/app-helpers.js"></script>
<script>
const orderId = new URLSearchParams(window.location.search).get('id');

auth.onAuthStateChanged(async user => {
  document.body.style.visibility = 'visible';
  if (!user) return window.location.href = '../admin-login.html';
  try {
    const adminDoc = await db.collection('admins').doc(user.uid).get();
    if (!adminDoc.exists) return window.location.href = '../index.html';
  } catch(e) {
    return window.location.href = '../admin-login.html';
  }
  if (!orderId) { showError('無效的訂單連結，請重新掃描'); return; }
  loadOrder();
});

async function loadOrder() {
  try {
    const snap = await db.collection('orders').doc(orderId).get();
    if (!snap.exists) { showError('找不到此訂單'); return; }
    renderOrder(snap.data());
  } catch(e) {
    showError('載入失敗：' + e.message);
  }
}

function renderOrder(o) {
  // 員工資訊
  document.getElementById('o-dept').textContent  = o.empDept || '—';
  document.getElementById('o-name').textContent  = o.empName || '—';
  document.getElementById('o-empid').textContent = o.empId   || '—';
  const ts = o.createdAt ? o.createdAt.toDate() : null;
  document.getElementById('o-time').textContent  = ts ? ts.toLocaleString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }) : '—';

  // 商品列表
  document.getElementById('o-items').innerHTML = (o.items || []).map(i => `
    <div class="item-row">
      <div class="item-img">
        ${i.imageUrl ? `<img src="${escapeHtml(i.imageUrl)}" onerror="this.style.display='none'">` : '📦'}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:.92rem">${escapeHtml(i.name)}</div>
        ${i.variantName ? `<div style="font-size:.76rem;color:var(--muted)">樣式：${escapeHtml(i.variantName)}</div>` : ''}
        <div style="font-size:.8rem;color:var(--muted)">${formatPrice(i.price)} × ${i.qty} 件</div>
      </div>
      <div style="font-weight:700;flex-shrink:0">${formatPrice(i.price * i.qty)}</div>
    </div>`).join('');

  // 合計
  document.getElementById('o-total').textContent = formatPrice(o.total ?? o.subtotal ?? 0);

  // 訂單 ID
  document.getElementById('o-orderid').textContent = 'ORDER ' + orderId.slice(0, 8).toUpperCase();

  // 狀態 header
  const statusMap = {
    pending:   ['待付款', 'status-pending'],
    paid:      ['已付款', 'status-paid'],
    cancelled: ['已取消', 'status-cancelled']
  };
  const [label, cls] = statusMap[o.status] || ['未知', 'status-cancelled'];
  document.getElementById('header-status').innerHTML =
    `<span class="status-pill ${cls}">${label}</span>`;

  // 動作按鈕
  if (o.status === 'pending') {
    document.getElementById('action-pending').style.display = 'block';
  } else if (o.status === 'paid') {
    document.getElementById('action-paid').style.display = 'flex';
  } else {
    document.getElementById('action-cancelled').style.display = 'block';
  }

  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('state-content').style.display = 'block';
}

async function confirmPayment() {
  const btn = document.getElementById('btn-pay');
  btn.disabled = true; btn.textContent = '處理中...';
  try {
    await db.collection('orders').doc(orderId).update({
      status: 'paid',
      paidAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('action-pending').style.display = 'none';
    document.getElementById('action-paid').style.display = 'flex';
    document.getElementById('header-status').innerHTML =
      '<span class="status-pill status-paid">已付款</span>';
  } catch(e) {
    alert('操作失敗：' + e.message);
    btn.disabled = false; btn.textContent = '✅  確認付款';
  }
}

function showError(msg) {
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('state-error').style.display = 'block';
}
</script>
</body>
</html>
