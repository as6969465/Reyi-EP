    .sidebar-footer { padding:.75rem; border-top:1px solid rgba(0,0,0,.06); }

    .main { flex:1; overflow-y:auto; background:var(--bg); min-width:0; }
    .main-header { background:rgba(255,255,255,.88); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px); border-bottom:1px solid rgba(210,210,215,.6); padding:.85rem 1.5rem; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
    .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; }
    .stat-card { background:#fff; border-radius:var(--radius); padding:1.25rem; box-shadow:var(--shadow); }
    .stat-label { font-size:.8rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
    .stat-value { font-size:1.75rem; font-weight:800; margin:.4rem 0; }
    .stat-sub { font-size:.8rem; color:var(--muted); }
    @media(max-width:900px){ .stat-grid{grid-template-columns:repeat(2,1fr);} .sidebar{display:none;} }
  </style>

    <button class="sidebar-link danger" onclick="doLogout()" style="width:100%"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 2.5H3a1 1 0 00-1 1V12.5a1 1 0 001 1H6.5"/><polyline points="10.5,11 14,8 10.5,5"/><line x1="14" y1="8" x2="6" y2="8"/></svg> 登出</button>

</aside>

<div class="main">
  <div class="main-header">
    <h1 style="font-size:1.1rem;font-weight:700">優惠設定</h1>
    <button class="btn btn-primary btn-sm" onclick="openModal()">＋ 新增優惠碼</button>
  </div>
  <div style="padding:1.5rem">
    <div class="card">
      <h3 style="font-weight:700;margin-bottom:1rem">優惠碼列表</h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th>優惠碼</th><th>類型</th><th>折扣</th><th>最低消費</th><th>狀態</th><th>操作</th></tr></thead>
          <tbody id="coupon-tbody"><tr><td colspan="6" style="text-align:center"><div class="spinner"></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 新增優惠碼 Modal -->
<div class="modal-overlay" id="coupon-modal" style="display:none">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 class="modal-title">新增優惠碼</h3>
    <div id="modal-alert"></div>
    <div class="form-group">
      <label class="form-label">優惠碼（大寫英數字）*</label>
      <input id="c-code" type="text" class="form-input" placeholder="SUMMER2024" style="text-transform:uppercase">
      <span class="form-hint">消費者結帳時輸入此代碼套用折扣</span>
    </div>
    <div class="form-group">
      <label class="form-label">折扣類型 *</label>
      <select id="c-type" class="form-select" onchange="toggleType()">
        <option value="fixed">固定金額折扣（NT$）</option>
        <option value="percent">百分比折扣（%）</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" id="c-value-label">折扣金額（NT$）*</label>
      <input id="c-value" type="number" class="form-input" min="1" placeholder="100">
    </div>
    <div class="form-group">
      <label class="form-label">最低消費金額（NT$，0 = 不限）</label>
      <input id="c-min" type="number" class="form-input" min="0" placeholder="0" value="0">
    </div>
    <div class="form-group">
      <label class="form-label">狀態</label>
      <select id="c-active" class="form-select">
        <option value="true">啟用</option>
        <option value="false">停用</option>
      </select>
    </div>
    <div style="display:flex;gap:.75rem">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveCoupon()">儲存優惠碼</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {

  authDomain: "reyi-ep.firebaseapp.com",
  projectId: "reyi-ep",
  storageBucket: "reyi-ep.firebasestorage.app",

  <script src="../js/app-helpers.js"></script>
<script>
let coupons = [];

auth.onAuthStateChanged(async user => {
  if (!user) return window.location.href = '../index.html';
  const doc = await db.collection('admins').doc(user.uid).get();
  if (!doc.exists) return window.location.href = '../shop.html';
  applyStoreName(' — 管理後台');
  loadCoupons();
});

async function loadCoupons() {
  try {
    const snap = await db.collection('coupons').get();
    coupons = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) {
    document.getElementById('coupon-tbody').innerHTML =
      `<tr><td colspan="6" style="text-align:center;color:var(--danger)">載入失敗：${escapeHtml(e.message)}</td></tr>`;
    return;
  }
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('coupon-tbody');
  tbody.innerHTML = coupons.length ? coupons.map(c => `
    <tr>
      <td style="font-family:monospace;font-weight:700;color:var(--primary)">${c.id}</td>
      <td>${c.type === 'percent' ? '百分比' : '固定金額'}</td>
      <td style="font-weight:700">${c.type === 'percent' ? c.value + '%' : formatPrice(c.value)}</td>
      <td>${c.minAmount ? formatPrice(c.minAmount) : '不限'}</td>
      <td><span class="badge ${c.active ? 'badge-success' : 'badge-gray'}">${c.active ? '啟用' : '停用'}</span></td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="toggleCoupon('${c.id}',${!c.active})">${c.active ? '停用' : '啟用'}</button>
        <button class="btn btn-danger btn-sm" style="margin-left:.4rem" onclick="deleteCoupon('${c.id}')">刪除</button>
      </td>
    </tr>`).join('') : '<tr><td colspan="6" style="text-align:center;color:var(--muted)">尚未建立優惠碼</td></tr>';
}

function toggleType() {
  const t = document.getElementById('c-type').value;
  document.getElementById('c-value-label').textContent = t === 'percent' ? '折扣百分比（%）*' : '折扣金額（NT$）*';
}

function openModal() {
  document.getElementById('modal-alert').innerHTML = '';
  ['c-code','c-value','c-min'].forEach(id => document.getElementById(id).value = id==='c-min'?'0':'');
  document.getElementById('c-type').value = 'fixed';
  document.getElementById('c-active').value = 'true';
  toggleType();
  document.getElementById('coupon-modal').style.display = 'flex';
}

function closeModal() { document.getElementById('coupon-modal').style.display = 'none'; }

async function saveCoupon() {
  const code = document.getElementById('c-code').value.trim().toUpperCase();
  const type = document.getElementById('c-type').value;
  const value = parseFloat(document.getElementById('c-value').value);
  const min = parseFloat(document.getElementById('c-min').value) || 0;
  const alertEl = document.getElementById('modal-alert');
  if (!code || !/^[A-Z0-9]+$/.test(code)) { alertEl.innerHTML = '<div class="alert alert-error">優惠碼只能使用大寫英文和數字</div>'; return; }
  if (isNaN(value) || value <= 0) { alertEl.innerHTML = '<div class="alert alert-error">請填寫有效的折扣值</div>'; return; }
  if (type === 'percent' && value > 100) { alertEl.innerHTML = '<div class="alert alert-error">百分比不能超過 100%</div>'; return; }
  try {
    await db.collection('coupons').doc(code).set({
      type, value, minAmount: min,
      active: document.getElementById('c-active').value === 'true',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    await loadCoupons();
    closeModal();
  } catch(e) {
    alertEl.innerHTML = `<div class="alert alert-error">儲存失敗：${e.message}</div>`;
  }
}

async function toggleCoupon(id, active) {
  await db.collection('coupons').doc(id).update({ active });
  const idx = coupons.findIndex(c=>c.id===id);
  if (idx>-1) coupons[idx].active = active;
  renderTable();
}

async function deleteCoupon(id) {
  if (!confirm(`確定刪除優惠碼 ${id}？`)) return;
  await db.collection('coupons').doc(id).delete();
  coupons = coupons.filter(c=>c.id!==id);
  renderTable();
}

function doLogout() { auth.signOut().then(() => window.location.href = '../index.html'); }
</script>
</body>
