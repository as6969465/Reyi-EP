    body { display:flex; min-height:100vh; }
    .sidebar { width:230px; background:#fff; border-right:1px solid rgba(0,0,0,.07); color:#1d1d1f; flex-shrink:0; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto; }
    .sidebar-brand { padding:1.4rem 1.25rem 1rem; border-bottom:1px solid rgba(0,0,0,.06); }
    .sidebar-brand-name { font-size:1.05rem; font-weight:800; color:#1d1d1f; letter-spacing:-.04em; }
    .sidebar-brand-sub { font-size:.73rem; color:#6e6e73; margin-top:.2rem; }
    .sidebar-nav { display:flex; flex-direction:column; gap:.1rem; padding:.75rem; flex:1; }
    .sidebar-link { display:flex; align-items:center; gap:.65rem; padding:.58rem .75rem; border-radius:10px; color:#3a3a3c; font-size:.875rem; font-weight:500; cursor:pointer; border:none; background:none; text-align:left; text-decoration:none; transition:background .15s, color .15s; font-family:inherit; }
    .sidebar-link:hover { background:rgba(0,0,0,.05); color:#1d1d1f; }
    .sidebar-link.active { background:rgba(0,102,204,.1); color:#0066cc; font-weight:600; }
    .sidebar-link svg { flex-shrink:0; opacity:.75; }
    .sidebar-link.active svg, .sidebar-link:hover svg { opacity:1; }
    .sidebar-footer { padding:.75rem; border-top:1px solid rgba(0,0,0,.06); }
    .sidebar-footer .sidebar-link { color:#6e6e73; }
    .sidebar-footer .sidebar-link:hover { color:#1d1d1f; }
    .sidebar-footer .sidebar-link.danger:hover { color:#ff3b30; background:rgba(255,59,48,.06); }
    .main { flex:1; overflow-y:auto; background:var(--bg); min-width:0; }
    .main-header { background:rgba(255,255,255,.88); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px); border-bottom:1px solid rgba(210,210,215,.6); padding:.85rem 1.5rem; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
    @media(max-width:900px){ .sidebar{display:none;} }
    @media(max-width:768px){
      .main-header{padding:.7rem 1rem;}
      #add-emp-grid{grid-template-columns:1fr 1fr!important;}
      #add-emp-grid>button{grid-column:1 / -1;width:100%;}
      #search-emp{width:100%!important;}
    }
    .emp-status-active { color:#34c759; font-weight:600; font-size:.82rem; }
    .emp-status-disabled { color:#ff3b30; font-weight:600; font-size:.82rem; }
    .csv-hint { font-size:.78rem; color:var(--muted); margin-top:.4rem; }
  </style>
  <script src="../js/store-name-init.js"></script>

<div class="main">
  <div class="main-header">
    <h1 style="font-size:1.1rem;font-weight:700">人員管理</h1>
    <span id="admin-name" style="font-size:.85rem;color:var(--muted)"></span>
  </div>

  <div style="padding:1.5rem;display:flex;flex-direction:column;gap:1.25rem">

    <!-- 新增員工 -->
    <div class="card">
      <h2 style="font-size:1rem;font-weight:700;margin-bottom:1rem">新增員工帳號</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:.75rem;align-items:end" id="add-emp-grid">
        <div>
          <label class="form-label">員工編號 <span style="color:var(--danger)">*</span></label>
          <input id="new-emp-id" type="text" class="form-input" placeholder="例：A12345">
        </div>
        <div>
          <label class="form-label">姓名 <span style="color:var(--danger)">*</span></label>
          <input id="new-emp-name" type="text" class="form-input" placeholder="員工姓名">
        </div>
        <div>
          <label class="form-label">廠商</label>
          <input id="new-emp-vendor" type="text" class="form-input" placeholder="委外廠商（選填）">
        </div>
        <div>
          <label class="form-label">部門</label>
          <input id="new-emp-dept" type="text" class="form-input" placeholder="部門（選填）">
        </div>
        <button class="btn btn-primary" onclick="addEmployee()" id="btn-add" style="white-space:nowrap">新增員工</button>
      </div>
      <div id="add-alert" style="margin-top:.75rem"></div>

      <div style="margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
          <label class="btn btn-outline" style="cursor:pointer;margin:0">
            📂 批次匯入 Excel
            <input type="file" accept=".xlsx,.xls" onchange="importExcel(this)" style="display:none">
          </label>
          <span class="csv-hint">支援「委外人員在離職名冊」Excel 格式，自動讀取員工編號、姓名、委外廠商、課別</span>
        </div>
        <div id="import-progress" style="margin-top:.75rem"></div>
      </div>
    </div>

    <!-- 員工列表 -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:1rem;flex-wrap:wrap">
        <h2 style="font-size:1rem;font-weight:700">員工名單</h2>
        <div style="display:flex;align-items:center;gap:.75rem">
          <input id="search-emp" type="text" class="form-input" placeholder="搜尋員工編號或姓名…"
                 style="width:200px;margin:0" oninput="filterList()">
          <span id="emp-count" style="font-size:.82rem;color:var(--muted);white-space:nowrap"></span>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table class="table" style="min-width:560px">
          <thead>
            <tr>
              <th>員工編號</th>
              <th>姓名</th>
              <th>廠商</th>
              <th>部門</th>
              <th style="text-align:center">狀態</th>
              <th style="text-align:center">建立時間</th>
              <th style="text-align:center">操作</th>
            </tr>
          </thead>
          <tbody id="emp-list">
            <tr><td colspan="7" style="text-align:center"><div class="spinner" style="margin:.5rem auto;display:block"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyByVQewloZcL4cMrPKxyZ5JlhaGS4Zep08",
  authDomain: "reyi-ep.firebaseapp.com",
  projectId: "reyi-ep",
  storageBucket: "reyi-ep.firebasestorage.app",
  messagingSenderId: "90799325656",
  appId: "1:90799325656:web:df2ce64d86ef9c9060b2ad"
};
firebase.initializeApp(firebaseConfig);
</script>
<script src="../js/app-helpers.js"></script>
<script>
let secondaryApp = null;
function getSecondaryAuth() {
  if (!secondaryApp) {
    const cfg = {
      apiKey: "AIzaSyByVQewloZcL4cMrPKxyZ5JlhaGS4Zep08",
      authDomain: "reyi-ep.firebaseapp.com",
      projectId: "reyi-ep",
      storageBucket: "reyi-ep.firebasestorage.app",
      messagingSenderId: "90799325656",
      appId: "1:90799325656:web:df2ce64d86ef9c9060b2ad"
    };
    secondaryApp = firebase.initializeApp(cfg, 'secondary');
  }
  return secondaryApp.auth();
}

let allEmployees = [];

auth.onAuthStateChanged(async user => {
  if (!user) return window.location.href = '../admin-login.html';
  const adminDoc = await db.collection('admins').doc(user.uid).get();
  if (!adminDoc.exists) return window.location.href = '../shop.html';
  applyStoreName(' — 管理後台');
  document.getElementById('admin-name').textContent = user.displayName || user.email;
  loadEmployees();
});

async function loadEmployees() {
  try {
    const snap = await db.collection('employees').orderBy('createdAt', 'desc').get();
    allEmployees = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderList(allEmployees);
    document.getElementById('emp-count').textContent = `共 ${allEmployees.length} 人`;
  } catch(e) {
    document.getElementById('emp-list').innerHTML =
      `<tr><td colspan="6" style="text-align:center;color:var(--danger)">載入失敗：${escapeHtml(e.message)}</td></tr>`;
  }
}

function filterList() {
  const q = document.getElementById('search-emp').value.trim().toLowerCase();
  const filtered = q ? allEmployees.filter(e =>
    (e.empId || e.id || '').toLowerCase().includes(q) ||
    (e.name || '').toLowerCase().includes(q) ||
    (e.vendor || '').toLowerCase().includes(q)
  ) : allEmployees;
  renderList(filtered);
  document.getElementById('emp-count').textContent = `${filtered.length} / ${allEmployees.length} 人`;
}

function renderList(list) {
  const tbody = document.getElementById('emp-list');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--muted)">尚無員工資料</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(e => {
    const active = e.isActive !== false;
    const dateStr = e.createdAt ? formatDate(e.createdAt) : '—';
    return `<tr>
      <td style="font-weight:600">${escapeHtml(e.empId || e.id)}</td>
      <td>${escapeHtml(e.name || '—')}</td>
      <td style="color:var(--muted)">${escapeHtml(e.vendor || '—')}</td>
      <td style="color:var(--muted)">${escapeHtml(e.dept || '—')}</td>
      <td style="text-align:center">
        <span class="${active ? 'emp-status-active' : 'emp-status-disabled'}">${active ? '● 啟用' : '● 停用'}</span>
      </td>
      <td style="text-align:center;font-size:.8rem;color:var(--muted);white-space:nowrap">${dateStr}</td>
      <td style="text-align:center;white-space:nowrap;display:flex;gap:.4rem;justify-content:center">
        <button class="btn btn-outline" style="padding:.3rem .7rem;font-size:.8rem"
                onclick="toggleEmployee('${escapeHtml(e.empId || e.id)}', ${active})">
          ${active ? '停用' : '啟用'}
        </button>
        <button class="btn btn-outline" style="padding:.3rem .7rem;font-size:.8rem;color:var(--danger);border-color:var(--danger)"
                onclick="deleteEmployee('${escapeHtml(e.empId || e.id)}', '${escapeHtml(e.name || '')}')">
          刪除
        </button>
      </td>
    </tr>`;
  }).join('');
}

function showAddAlert(msg, type = 'error') {
  document.getElementById('add-alert').innerHTML =
    `<div class="alert alert-${type === 'success' ? 'success' : 'error'}">${msg}</div>`;
  if (type === 'success') setTimeout(() => document.getElementById('add-alert').innerHTML = '', 3000);
}

async function createEmpAccount(empId, name, vendor, dept) {
  const email = empId + '@reyi-ep.local';
  const password = 'Reyi@' + empId;
  const secAuth = getSecondaryAuth();
  let uid = null;
  try {
    const cred = await secAuth.createUserWithEmailAndPassword(email, password);
    uid = cred.user.uid;
    await cred.user.updateProfile({ displayName: name });
    await secAuth.signOut();
  } catch(e) {
    await secAuth.signOut().catch(() => {});
    if (e.code === 'auth/email-already-in-use') {
      // 帳號已存在，只更新 Firestore
    } else {
      throw e;
    }
  }
  await db.collection('employees').doc(empId).set({
    empId,
    name,
    vendor: vendor || '',
    dept: dept || '',
    isActive: true,
    uid: uid || '',
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true });
}

async function addEmployee() {
  const empId  = document.getElementById('new-emp-id').value.trim();
  const name   = document.getElementById('new-emp-name').value.trim();
  const vendor = document.getElementById('new-emp-vendor').value.trim();
  const dept   = document.getElementById('new-emp-dept').value.trim();
  if (!empId) return showAddAlert('請輸入員工編號');
  if (!name)  return showAddAlert('請輸入姓名');
  const btn = document.getElementById('btn-add');
  btn.disabled = true; btn.textContent = '建立中…';
  try {
    await createEmpAccount(empId, name, vendor, dept);
    showAddAlert(`員工 ${empId}（${name}）已成功建立`, 'success');
    document.getElementById('new-emp-id').value = '';
    document.getElementById('new-emp-name').value = '';
    document.getElementById('new-emp-vendor').value = '';
    document.getElementById('new-emp-dept').value = '';
    await loadEmployees();
  } catch(e) {
    showAddAlert('建立失敗：' + e.message);
  }
  btn.disabled = false; btn.textContent = '新增員工';
}

async function deleteEmployee(empId, name) {
  if (!confirm(`確定要刪除員工「${name}（${empId}）」？此動作無法復原。`)) return;
  try {
    await db.collection('employees').doc(empId).delete();
    await loadEmployees();
  } catch(e) {
    alert('刪除失敗：' + e.message);
  }
}

async function toggleEmployee(empId, currentActive) {
  try {
    await db.collection('employees').doc(empId).update({ isActive: !currentActive });
    await loadEmployees();
  } catch(e) {
    alert('操作失敗：' + e.message);
  }
}

async function importExcel(input) {
  const file = input.files[0];
  if (!file) return;
  const prog = document.getElementById('import-progress');
  prog.innerHTML = '<div class="alert alert-info">讀取 Excel 中…</div>';
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    // 「委外人員在離職名冊」格式：前8列為標題，第9列起為資料
    // 欄位（0-indexed）: 0=部門, 1=課別, 2=組別, 3=委外廠商, 4=DC別, 5=員工編號, 6=姓名
    // 自動偵測資料起始列：找員工編號欄不為空且看起來像編號的那列
    let dataStart = 8; // 預設從第9列（index 8）開始
    for (let i = 0; i < rows.length; i++) {
      const empId = String(rows[i][5] || '').trim();
      if (empId && empId !== '員工編號' && empId.length > 3) {
        dataStart = i;
        break;
      }
    }
    const valid = [];
    for (let i = dataStart; i < rows.length; i++) {
      const empId  = String(rows[i][5] || '').trim();
      const name   = String(rows[i][6] || '').trim();
      const vendor = String(rows[i][3] || '').trim();
      const dept   = String(rows[i][1] || '').trim();
      if (empId && name && empId !== '員工編號') {
        valid.push({ empId, name, vendor, dept });
      }
    }
    if (!valid.length) {
      prog.innerHTML = '<div class="alert alert-error">找不到有效員工資料，請確認檔案格式</div>';
      input.value = '';
      return;
    }
    prog.innerHTML = `<div class="alert alert-info">正在匯入 ${valid.length} 筆資料，請稍候…</div>`;
    // 用 Firestore batch 批次寫入，不建立 Auth 帳號（員工首次登入時自動建立）
    const BATCH_SIZE = 500;
    let ok = 0, fail = 0;
    for (let i = 0; i < valid.length; i += BATCH_SIZE) {
      const chunk = valid.slice(i, i + BATCH_SIZE);
      const batch = db.batch();
      for (const { empId, name, vendor, dept } of chunk) {
        try {
          const ref = db.collection('employees').doc(empId);
          batch.set(ref, { empId, name, vendor: vendor || '', dept: dept || '', isActive: true, uid: '', createdAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
          ok++;
        } catch(e) { fail++; }
      }
      await batch.commit();
      prog.innerHTML = `<div class="alert alert-info">匯入中… ${Math.min(i + BATCH_SIZE, valid.length)}/${valid.length}</div>`;
    }
    prog.innerHTML = `<div class="alert alert-${fail ? 'warn' : 'success'}">匯入完成：成功 ${ok} 筆${fail ? `，失敗 ${fail} 筆` : ''}（員工首次登入時將自動建立帳號）</div>`;
    input.value = '';
    await loadEmployees();
  } catch(e) {
    prog.innerHTML = `<div class="alert alert-error">讀取失敗：${e.message}</div>`;
    input.value = '';
  }
}

function doLogout() {
  auth.signOut().then(() => window.location.href = '../admin-login.html');
}
</script>
