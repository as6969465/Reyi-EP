  <style>
    body { display:flex; min-height:100vh; }
    .sidebar { width:230px; background:#fff; border-right:1px solid rgba(0,0,0,.07); color:#1d1d1f; flex-shrink:0; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto; }

    .sidebar-brand-sub { font-size:.73rem; color:#6e6e73; margin-top:.2rem; }
    .sidebar-nav { display:flex; flex-direction:column; gap:.1rem; padding:.75rem; flex:1; }
    .sidebar-link { display:flex; align-items:center; gap:.65rem; padding:.58rem .75rem; border-radius:10px; color:#3a3a3c; font-size:.875rem; font-weight:500; cursor:pointer; border:none; background:none; text-align:left; text-decoration:none; transition:background .15s, color .15s; font-family:inherit; }
    .sidebar-link:hover { background:rgba(0,0,0,.05); color:#1d1d1f; }
    .sidebar-link.active { background:rgba(0,102,204,.1); color:#0066cc; font-weight:600; }
    .sidebar-link svg { flex-shrink:0; opacity:.75; }
    .sidebar-link.active svg, .sidebar-link:hover svg { opacity:1; }
    .sidebar-footer { padding:.75rem; border-top:1px solid rgba(0,0,0,.06); }
    .sidebar-footer .sidebar-link { color:#6e6e73; }
    .sidebar-footer .sidebar-link:hover { color:#1d1d1f; }
    .sidebar-footer .sidebar-link.danger:hover { color:#ff3b30; background:rgba(255,59,48,.06); }
    .main { flex:1; overflow-y:auto; background:var(--bg); min-width:0; }
    .main-header { background:rgba(255,255,255,.88); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px); border-bottom:1px solid rgba(210,210,215,.6); padding:.85rem 1.5rem; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
    .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; }
    .stat-card { background:#fff; border-radius:var(--radius); padding:1.25rem; box-shadow:var(--shadow); }
    .stat-label { font-size:.8rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
    .stat-value { font-size:1.75rem; font-weight:800; margin:.4rem 0; }
    .stat-sub { font-size:.8rem; color:var(--muted); }

    @media(max-width:768px){

<script>
const STATUS_BADGE = { pending:'badge-warn', paid:'badge-success', cancelled:'badge-danger' };
const STATUS_LABEL = { pending:'待取貨付款', paid:'已取貨付款', cancelled:'取消訂單' };

const PALETTE = ['#0066cc','#30d158','#ff9f0a','#ff3b30','#5e5ce6','#64d2ff','#bf5af2','#ff6961'];

let allOrders = [];
let allProducts = [];

function drawPie(svgId, legendId, data) {
  const svg = document.getElementById(svgId);
  const legend = document.getElementById(legendId);
  if (!data.length) {
    svg.innerHTML = '<text x="100" y="108" text-anchor="middle" font-size="13" fill="#aaa">無資料</text>';
    legend.innerHTML = '';
    return;
  }
  const total = data.reduce((s, d) => s + d.value, 0);
  if (total === 0) {
    svg.innerHTML = '<circle cx="100" cy="100" r="80" fill="#f2f2f7"/><text x="100" y="108" text-anchor="middle" font-size="13" fill="#aaa">無資料</text>';
    legend.innerHTML = '';
    return;
  }
  // 單一項目時直接畫整圓
  if (data.length === 1) {
    svg.innerHTML = `<circle cx="100" cy="100" r="80" fill="${PALETTE[0]}" stroke="#fff" stroke-width="2"/><text x="100" y="105" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">100%</text>`;
    legend.innerHTML = `<div style="display:flex;align-items:center;gap:.4rem"><span style="width:10px;height:10px;border-radius:2px;background:${PALETTE[0]};flex-shrink:0;display:inline-block"></span><span>${escapeHtml(data[0].label)}</span><span style="color:var(--muted)">${data[0].value}</span></div>`;
    return;
  }
  let angle = -Math.PI / 2;
  const cx = 100, cy = 100, r = 80, labelR = 52;
  let paths = '', labels = '';
  data.forEach((d, i) => {
    const sweep = (d.value / total) * 2 * Math.PI;
    const x1 = cx + r * Math.cos(angle);
    const y1 = cy + r * Math.sin(angle);
    const midAngle = angle + sweep / 2;
    angle += sweep;
    const x2 = cx + r * Math.cos(angle);
    const y2 = cy + r * Math.sin(angle);
    const large = sweep > Math.PI ? 1 : 0;
    paths += `<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${PALETTE[i % PALETTE.length]}" stroke="#fff" stroke-width="2"/>`;
    const pct = Math.round(d.value / total * 100);
    if (pct >= 5) {
      const lx = (cx + labelR * Math.cos(midAngle)).toFixed(1);
      const ly = (cy + labelR * Math.sin(midAngle) + 4).toFixed(1);
      labels += `<text x="${lx}" y="${ly}" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">${pct}%</text>`;
    }
  });
  svg.innerHTML = paths + labels;
  legend.innerHTML = data.map((d, i) =>
    `<div style="display:flex;align-items:center;gap:.35rem">
      <span style="width:10px;height:10px;border-radius:2px;background:${PALETTE[i%PALETTE.length]};flex-shrink:0;display:inline-block"></span>
      <span>${escapeHtml(d.label)}</span>
      <span style="color:var(--muted)">${d.value}</span>
    </div>`
  ).join('');
}

auth.onAuthStateChanged(async user => {
  if (!user) return window.location.href = '../index.html';
  const adminDoc = await db.collection('admins').doc(user.uid).get();
  if (!adminDoc.exists) return window.location.href = '../shop.html';
  applyStoreName(' — 管理後台');
  const email = user.email || '';
  document.getElementById('admin-name').textContent = user.displayName || email.split('@')[0];
  loadDashboard();
});

async function loadDashboard() {
  let ordersSnap, productsSnap;
  try {
    [ordersSnap, productsSnap] = await Promise.all([
      db.collection('orders').get(),
      db.collection('products').where('active','==',true).get()
    ]);
  } catch(e) {
    document.getElementById('product-revenue').innerHTML =
      `<tr><td colspan="4" style="text-align:center;color:var(--danger)">載入失敗：${escapeHtml(e.message)}</td></tr>`;
    document.getElementById('low-stock-list').innerHTML =
      `<p style="color:var(--danger);font-size:.9rem">載入失敗</p>`;
    return;
  }

  const orders = ordersSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const products = productsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  allOrders = orders;
  allProducts = products;

  // 統計
  const today = new Date(); today.setHours(0,0,0,0);
  const todayOrders = orders.filter(o => o.createdAt?.toDate() >= today);
  const pending = orders.filter(o => o.status === 'pending');
  const revenue = orders.filter(o => o.status === 'paid').reduce((s,o) => s + (o.total||0), 0);

  document.getElementById('stat-today').textContent = todayOrders.length;
  document.getElementById('stat-revenue').textContent = formatPrice(revenue);
  document.getElementById('stat-pending').textContent = pending.length;
  document.getElementById('stat-products').textContent = products.length;

  // 商品銷售金額排行
  renderProductRevenue();

  // 低庫存
  const getEffectiveStock = p => p.variants && p.variants.length
    ? p.variants.reduce((s, v) => s + (Number(v.stock) || 0), 0)
    : (p.stock ?? 999);
  const lowStock = products
    .map(p => ({ ...p, _stock: getEffectiveStock(p) }))
    .filter(p => p._stock < 10)
    .sort((a, b) => a._stock - b._stock);
  const el = document.getElementById('low-stock-list');
  el.innerHTML = lowStock.length ? lowStock.map(p => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border)">
      <span style="font-size:.9rem">${escapeHtml(p.name)}${p.variants&&p.variants.length?` <span style="font-size:.75rem;color:var(--muted)">(${p.variants.length}樣式)</span>`:''}</span>
      <span class="badge ${p._stock<=0?'badge-danger':'badge-warn'}">${p._stock<=0?'售完':'剩 '+p._stock}</span>
    </div>`).join('') : '<p style="color:var(--muted);font-size:.9rem">庫存狀況良好 ✅</p>';

  // 圓餅圖 1：商品類型分布（各分類商品數）
  const catMap = {};
  products.forEach(p => {
    const c = p.category || '未分類';
    catMap[c] = (catMap[c] || 0) + 1;
  });
  drawPie('pie-category', 'legend-category',
    Object.entries(catMap).map(([label, value]) => ({ label, value }))
      .sort((a, b) => b.value - a.value));

  // 圓餅圖 2：各類型販售量（從訂單統計，依商品分類加總）
  const salesCatMap = {};
  const productCatMap = {};
  products.forEach(p => { productCatMap[p.name] = p.category || '未分類'; });
  orders.filter(o => o.status !== 'cancelled').forEach(o => {
    (o.items || []).forEach(item => {
      const cat = productCatMap[item.name] || '未分類';
      salesCatMap[cat] = (salesCatMap[cat] || 0) + (Number(item.qty) || 1);
    });
  });
  drawPie('pie-sales', 'legend-sales',
    Object.entries(salesCatMap).map(([label, value]) => ({ label, value }))
      .sort((a, b) => b.value - a.value));

  // 圓餅圖 3：各類型庫存量（依商品分類加總庫存）
  const stockCatMap = {};
  products.forEach(p => {
    const cat = p.category || '未分類';
    stockCatMap[cat] = (stockCatMap[cat] || 0) + getEffectiveStock(p);
  });
  drawPie('pie-stock', 'legend-stock',
    Object.entries(stockCatMap).map(([label, value]) => ({ label, value }))
      .filter(d => d.value > 0)
      .sort((a, b) => b.value - a.value));
}

function clearRevDateFilter() {
  document.getElementById('rev-date-from').value = '';
  document.getElementById('rev-date-to').value = '';
  renderProductRevenue();
}

function renderProductRevenue() {
  const tbody = document.getElementById('product-revenue');
  const from = document.getElementById('rev-date-from').value;
  const to   = document.getElementById('rev-date-to').value;
  const fromTs = from ? new Date(from).getTime() : null;
  const toTs   = to   ? new Date(to + 'T23:59:59').getTime() : null;

  const paidOrders = allOrders.filter(o => {
    if (o.status !== 'paid') return false;
    if (fromTs || toTs) {
      const ts = o.createdAt?.seconds ? o.createdAt.seconds * 1000 : (o.createdAt?.toDate?.()?.getTime?.() ?? 0);
      if (fromTs && ts < fromTs) return false;
      if (toTs   && ts > toTs)   return false;
    }
    return true;
  });

  const revMap = {};
  paidOrders.forEach(o => {
    (o.items || []).forEach(item => {
      const name = item.name || '未命名商品';
      if (!revMap[name]) revMap[name] = { qty: 0, amount: 0 };
      const qty = Number(item.qty) || 0;
      revMap[name].qty += qty;
      revMap[name].amount += (Number(item.price) || 0) * qty;
    });
  });

  const ranked = Object.entries(revMap)
    .map(([name, v]) => ({ name, ...v }))
    .sort((a, b) => b.amount - a.amount);

  tbody.innerHTML = ranked.length ? ranked.map((r, i) => `
    <tr>
      <td style="font-weight:700;color:var(--muted)">${i+1}</td>
      <td>${escapeHtml(r.name)}</td>
      <td>${r.qty}</td>
      <td style="font-weight:700;color:var(--primary)">${formatPrice(r.amount)}</td>
    </tr>`).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--muted)">此區間暫無已取貨付款訂單</td></tr>';
}

function doLogout() {
  auth.signOut().then(() => window.location.href = '../index.html');
}
