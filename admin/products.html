    .variant-headers { display:grid; grid-template-columns:1.4fr 80px 80px 70px auto; gap:.45rem; padding:0 .7rem; margin-bottom:.2rem; }
  </style>

      </div>

        <label class="form-label">原價 (NT$) *</label>

      </div>
      <div class="form-group">
        <label class="form-label">特價 (NT$，留空=不特價)</label>
        <input id="p-sale" type="number" class="form-input" min="0" placeholder="選填">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">庫存數量 <span style="font-weight:400;color:var(--muted);font-size:.8rem">（有樣式時，以各樣式庫存為準）</span></label>
        <input id="p-stock" type="number" class="form-input" min="0">

        <label class="form-label">商品圖片</label>
        <div id="images-preview-area" style="display:flex;flex-wrap:wrap;gap:.6rem;margin-bottom:.75rem"></div>

        <p style="font-size:.76rem;color:var(--muted);margin-top:.4rem">支援 PNG / JPG，上傳後自動壓縮。</p>
      </div>

      <!-- 商品說明 -->
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">商品說明</label>
        <textarea id="p-desc" class="form-textarea"></textarea>
      </div>

<script>
let products = [];
let editId = null;
let categories = [];
let productImages = [];   // 目前 modal 的圖片陣列（URL 字串）
let productVariants = []; // 目前 modal 的樣式陣列

// ── 分類 ──────────────────────────────────────────────────
async function loadCategories() {
  try {
    const snap = await db.collection('settings').doc('categories').get();
    categories = snap.exists ? (snap.data().items || []) : [];
  } catch(e) { categories = []; }
  refreshCatSelects();
}

function refreshCatSelects() {
  const sel = document.getElementById('p-cat');
  const current = sel.value;
  sel.innerHTML = '<option value="">— 請選擇分類 —</option>' +
    categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  if (current) sel.value = current;

  const filter = document.getElementById('filter-cat');
  const fCurrent = filter.value;
  filter.innerHTML = '<option value="">所有分類</option>' +
    categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  if (fCurrent) filter.value = fCurrent;
}

async function saveCategories() {
  await db.collection('settings').doc('categories').set({ items: categories });
}

function openCatModal() { renderCatList(); document.getElementById('cat-modal').style.display = 'flex'; }
function closeCatModal() { document.getElementById('cat-modal').style.display = 'none'; }

function renderCatList() {
  const area = document.getElementById('cat-list-area');
  if (!categories.length) {
    area.innerHTML = '<p style="color:var(--muted);font-size:.88rem;text-align:center;padding:1rem">尚無分類，請新增</p>';
    return;
  }
  area.innerHTML = categories.map((c, i) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:.55rem .75rem;background:#f8fafc;border-radius:8px;border:1px solid var(--border)">
      <span style="font-size:.9rem;font-weight:500">${escapeHtml(c)}</span>
      <button onclick="deleteCategory(${i})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;padding:.2rem .5rem;border-radius:4px;transition:color .15s"
        onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color='var(--muted)'">✕ 刪除</button>
    </div>`).join('');
}

async function addCategory() {
  const input = document.getElementById('new-cat-input');
  const name = input.value.trim();
  if (!name) return;
  if (categories.includes(name)) { input.style.borderColor = 'var(--danger)'; setTimeout(() => input.style.borderColor = '', 1500); return; }
  categories.push(name);
  input.value = '';
  await saveCategories();
  refreshCatSelects();
  renderCatList();
}

async function deleteCategory(idx) {
  categories.splice(idx, 1);
  await saveCategories();
  refreshCatSelects();
  renderCatList();
}


// ── 商品圖片管理（多張）────────────────────────────────────
function renderImagesPreview() {
  const area = document.getElementById('images-preview-area');
  if (!productImages.length) { area.innerHTML = ''; return; }
  area.innerHTML = productImages.map((_, idx) => `
    <div class="img-thumb-wrap">
      <img data-img-idx="${idx}">
      ${idx === 0 ? '<span class="img-thumb-primary">主圖</span>' : ''}
      <button class="img-thumb-del" data-del="${idx}" onclick="removeImage(+this.dataset.del)">✕</button>
    </div>`).join('');
  area.querySelectorAll('img[data-img-idx]').forEach(img => {
    img.src = safeImgSrc(productImages[+img.dataset.imgIdx]) || '';
  });
}

function removeImage(idx) {
  productImages.splice(idx, 1);
  renderImagesPreview();
}


function addImageFromUrl() {
  const input = document.getElementById('p-img-url');
  const url = input.value.trim();
  if (!url || !/^https?:\/\//i.test(url)) {
    input.style.borderColor = 'var(--danger)';
    setTimeout(() => input.style.borderColor = '', 1500);
    return;
  }
  productImages.push(url);
  renderImagesPreview();
  input.value = '';
}

function compressImageFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else        { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function handleFileUpload(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  const statusEl = document.getElementById('upload-status');
  statusEl.textContent = `壓縮中 0/${files.length}…`;
  for (let i = 0; i < files.length; i++) {
    try {
      const b64 = await compressImageFile(files[i]);
      productImages.push(b64);
      renderImagesPreview();
      statusEl.textContent = `壓縮中 ${i + 1}/${files.length}…`;
    } catch(e) {
      statusEl.textContent = `第 ${i+1} 張失敗：${e.message}`;
    }
  }
  statusEl.textContent = `已加入 ${files.length} 張`;
  setTimeout(() => { statusEl.textContent = ''; }, 2500);
  input.value = '';
}

// ── 商品樣式管理 ──────────────────────────────────────────
function renderVariantsList() {
  const list = document.getElementById('variants-list');
  const empty = document.getElementById('variants-empty');
  const header = document.getElementById('variants-header');

  list.querySelectorAll('.variant-row').forEach(r => r.remove());

  if (!productVariants.length) {
    empty.style.display = '';
    header.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  header.style.display = 'grid';

  productVariants.forEach((v, idx) => {
    const row = document.createElement('div');
    row.className = 'variant-row';
    row.innerHTML = `
      <input type="text" class="form-input" placeholder="樣式名稱 *" value="${escapeHtml(v.name)}"
        data-idx="${idx}" data-field="name" onchange="updateVariantField(+this.dataset.idx,this.dataset.field,this.value)">
      <input type="number" class="form-input" placeholder="原價 *" value="${v.price!=null?v.price:''}" min="0"
        data-idx="${idx}" data-field="price" onchange="updateVariantField(+this.dataset.idx,this.dataset.field,+this.value)">
      <input type="number" class="form-input" placeholder="特價" value="${v.salePrice!=null?v.salePrice:''}" min="0"
        data-idx="${idx}" data-field="salePrice" onchange="updateVariantField(+this.dataset.idx,this.dataset.field,this.value===''?null:+this.value)">
      <input type="number" class="form-input" placeholder="庫存 *" value="${v.stock!=null?v.stock:''}" min="0"
        data-idx="${idx}" data-field="stock" onchange="updateVariantField(+this.dataset.idx,this.dataset.field,+this.value)">
      <button type="button" data-del="${idx}" onclick="removeVariant(+this.dataset.del)"
        style="color:var(--danger);border:1.5px solid var(--danger);border-radius:8px;padding:.3rem .55rem;font-size:.8rem;background:none;cursor:pointer;font-weight:700;white-space:nowrap">✕</button>`;
    list.appendChild(row);
  });
}

function addVariant() {
  productVariants.push({ id: 'v_' + Date.now() + '_' + productVariants.length, name: '', price: null, salePrice: null, stock: null, imageUrl: '' });
  renderVariantsList();
}

function removeVariant(idx) {
  productVariants.splice(idx, 1);
  renderVariantsList();
}

function updateVariantField(idx, field, value) {
  if (productVariants[idx] !== undefined) productVariants[idx][field] = value;
}


// ── Auth ──────────────────────────────────────────────────
auth.onAuthStateChanged(async user => {
  if (!user) return window.location.href = '../index.html';
  const doc = await db.collection('admins').doc(user.uid).get();
  if (!doc.exists) return window.location.href = '../shop.html';
  applyStoreName(' — 管理後台');
  await loadCategories();
  loadProducts();
});

async function loadProducts() {
  try {
    const snap = await db.collection('products').get();
    products = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (b.createdAt?.seconds ?? 0) - (a.createdAt?.seconds ?? 0));
    renderTable();
  } catch(e) {
    document.getElementById('product-tbody').innerHTML =
      `<tr><td colspan="6" style="text-align:center;color:var(--danger)">載入失敗：${escapeHtml(e.message)}</td></tr>`;
  }
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('filter-cat').value;
  const status = document.getElementById('filter-status').value;
  const filtered = products.filter(p => {
    if (q && !p.name.toLowerCase().includes(q)) return false;
    if (cat && p.category !== cat) return false;
    if (status === 'active' && !p.active) return false;
    if (status === 'inactive' && p.active) return false;
    return true;
  });
  const tbody = document.getElementById('product-tbody');
  tbody.innerHTML = filtered.length ? filtered.map(p => {
    const imgSrc = safeImgSrc(p.imageUrl);
    const hasVariants = p.variants && p.variants.length > 0;
    const variantTotalStock = hasVariants ? p.variants.reduce((s, v) => s + (Number(v.stock) || 0), 0) : 0;
    const stockBadge = hasVariants
      ? `<span class="badge ${variantTotalStock<=0?'badge-danger':variantTotalStock<10?'badge-warn':'badge-info'}">${variantTotalStock<=0?'售完':variantTotalStock} <span style="font-weight:400;font-size:.75em">/ ${p.variants.length}樣式</span></span>`
      : `<span class="badge ${(p.stock??999)<=0?'badge-danger':(p.stock??999)<10?'badge-warn':'badge-success'}">${(p.stock??999)<=0?'售完':escapeHtml(String(p.stock??'∞'))}</span>`;
    const imgCount = (p.images && p.images.length > 1) ? `<span style="font-size:.7rem;color:var(--muted);margin-left:.3rem">(${p.images.length}張)</span>` : '';
    return `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:.6rem">
          <div style="width:38px;height:38px;border-radius:6px;background:#f1f5f9;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.1rem">
            ${imgSrc ? `<img src="${imgSrc}" style="width:100%;height:100%;object-fit:cover">` : '📦'}
          </div>
          <span style="font-weight:600">${escapeHtml(p.name)}</span>${imgCount}
        </div>
      </td>
      <td>${escapeHtml(p.category || '—')}</td>
      <td>${(() => {
          if (hasVariants) {
            const prices = p.variants.map(v => v.salePrice ?? v.price ?? 0).sort((a,b) => a-b);
            const lo = prices[0], hi = prices[prices.length-1];
            return lo === hi
              ? `<span style="font-weight:700">${formatPrice(lo)}</span>`
              : `<span style="font-weight:700">${formatPrice(lo)}</span> <span style="color:var(--muted);font-size:.82rem">~ ${formatPrice(hi)}</span>`;
          }
          return p.salePrice
            ? `<span style="color:var(--danger);font-weight:700">${formatPrice(p.salePrice)}</span> <span style="text-decoration:line-through;color:var(--muted);font-size:.8rem">${formatPrice(p.price)}</span>`
            : formatPrice(p.price);
        })()}</td>
      <td>${stockBadge}</td>
      <td><span class="badge ${p.active?'badge-success':'badge-gray'}">${p.active?'上架中':'已下架'}</span></td>
      <td>
        <button class="btn btn-outline btn-sm" data-pid="${escapeHtml(p.id)}" onclick="editProduct(this.dataset.pid)">編輯</button>
        <button class="btn btn-sm" data-pid="${escapeHtml(p.id)}" data-active="${!p.active}" onclick="toggleActive(this.dataset.pid, this.dataset.active==='true')" style="margin-left:.4rem;color:${p.active?'var(--danger)':'var(--success)'};border:1.5px solid currentColor;border-radius:8px;padding:.35rem .8rem;font-size:.8rem;font-weight:600;background:none;cursor:pointer">
          ${p.active?'下架':'上架'}
        </button>
      </td>
    </tr>`;
  }).join('') : '<tr><td colspan="6" style="text-align:center;color:var(--muted)">找不到商品</td></tr>';
}

function resetFormUI() {
  productImages = [];
  productVariants = [];
  renderImagesPreview();
  renderVariantsList();
  document.getElementById('p-img-url').value = '';
}

function openModal() {
  editId = null;
  document.getElementById('modal-title').textContent = '新增商品';
  ['p-name','p-price','p-sale','p-stock','p-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('p-cat').value = '';
  document.getElementById('p-active').value = 'true';
  document.getElementById('modal-alert').innerHTML = '';
  resetFormUI();
  document.getElementById('product-modal').style.display = 'flex';
}

function editProduct(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  editId = id;
  document.getElementById('modal-title').textContent = '編輯商品';
  document.getElementById('p-name').value = p.name || '';
  document.getElementById('p-cat').value = p.category || '';
  document.getElementById('p-price').value = p.price || '';
  document.getElementById('p-sale').value = p.salePrice || '';
  document.getElementById('p-stock').value = p.stock ?? '';
  document.getElementById('p-desc').value = p.description || '';
  document.getElementById('p-active').value = p.active ? 'true' : 'false';
  document.getElementById('modal-alert').innerHTML = '';

  resetFormUI();
  // Load images (after resetFormUI clears them)
  productImages = (p.images && p.images.length) ? [...p.images] : (p.imageUrl ? [p.imageUrl] : []);
  productVariants = p.variants ? p.variants.map(v => ({ ...v })) : [];
  renderImagesPreview();
  renderVariantsList();

  document.getElementById('product-modal').style.display = 'flex';
}

function closeModal() { document.getElementById('product-modal').style.display = 'none'; }

async function saveProduct() {
  const name = document.getElementById('p-name').value.trim();
  const price = parseFloat(document.getElementById('p-price').value);
  const alertEl = document.getElementById('modal-alert');

  if (!name) { alertEl.innerHTML = '<div class="alert alert-error">請填寫商品名稱</div>'; return; }
  if (isNaN(price)) { alertEl.innerHTML = '<div class="alert alert-error">請填寫原價</div>'; return; }

  for (let i = 0; i < productVariants.length; i++) {
    const v = productVariants[i];
    if (!v.name || !String(v.name).trim()) { alertEl.innerHTML = `<div class="alert alert-error">第 ${i+1} 個樣式請填寫名稱</div>`; return; }
    if (v.price == null || isNaN(+v.price)) { alertEl.innerHTML = `<div class="alert alert-error">第 ${i+1} 個樣式請填寫原價</div>`; return; }
    if (v.stock == null || isNaN(+v.stock)) { alertEl.innerHTML = `<div class="alert alert-error">第 ${i+1} 個樣式請填寫庫存</div>`; return; }
  }

  const saleVal = document.getElementById('p-sale').value;
  const stockVal = document.getElementById('p-stock').value;
  const stock = stockVal !== '' ? parseInt(stockVal) : 0;

  const variants = productVariants.map((v, i) => ({
    id: v.id || ('v_' + Date.now() + '_' + i),
    name: String(v.name).trim(),
    price: Number(v.price),
    salePrice: v.salePrice != null && v.salePrice !== '' ? Number(v.salePrice) : null,
    stock: Number(v.stock),
    imageUrl: v.imageUrl || ''
  }));

  const data = {
    name,
    category: document.getElementById('p-cat').value.trim(),
    price,
    salePrice: saleVal ? parseFloat(saleVal) : null,
    stock,
    imageUrl: productImages[0] || '',
    images: [...productImages],
    variants,
    description: document.getElementById('p-desc').value.trim(),
    active: document.getElementById('p-active').value === 'true',
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = '儲存中...';
  try {
    if (editId) {
      await db.collection('products').doc(editId).update(data);
      const idx = products.findIndex(p => p.id === editId);
      if (idx > -1) products[idx] = { ...products[idx], ...data };
    } else {
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      const ref = await db.collection('products').add(data);
      products.unshift({ id: ref.id, ...data });
    }
    renderTable();
    closeModal();
  } catch(e) {
    alertEl.innerHTML = `<div class="alert alert-error">儲存失敗：${escapeHtml(e.message)}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = '儲存商品';
  }
}

async function toggleActive(id, active) {
  try {
    await db.collection('products').doc(id).update({ active });
    const idx = products.findIndex(p => p.id === id);
    if (idx > -1) products[idx].active = active;
    renderTable();
  } catch(e) {
    alert('更新失敗：' + e.message);
  }
}

function doLogout() { auth.signOut().then(() => window.location.href = '../index.html'); }
</script>
