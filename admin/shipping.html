    body { display:flex; min-height:100vh; }
    .sidebar { width:230px; background:#fff; border-right:1px solid rgba(0,0,0,.07); color:#1d1d1f; flex-shrink:0; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto; }

    .sidebar-brand-sub { font-size:.73rem; color:#6e6e73; margin-top:.2rem; }
    .sidebar-nav { display:flex; flex-direction:column; gap:.1rem; padding:.75rem; flex:1; }
    .sidebar-link { display:flex; align-items:center; gap:.65rem; padding:.58rem .75rem; border-radius:10px; color:#3a3a3c; font-size:.875rem; font-weight:500; cursor:pointer; border:none; background:none; text-align:left; text-decoration:none; transition:background .15s, color .15s; font-family:inherit; }
    .sidebar-link:hover { background:rgba(0,0,0,.05); color:#1d1d1f; }
    .sidebar-link.active { background:rgba(0,102,204,.1); color:#0066cc; font-weight:600; }
    .sidebar-link svg { flex-shrink:0; opacity:.75; }
    .sidebar-link.active svg, .sidebar-link:hover svg { opacity:1; }
    .sidebar-footer { padding:.75rem; border-top:1px solid rgba(0,0,0,.06); }
    .sidebar-footer .sidebar-link { color:#6e6e73; }
    .sidebar-footer .sidebar-link:hover { color:#1d1d1f; }
    .sidebar-footer .sidebar-link.danger:hover { color:#ff3b30; background:rgba(255,59,48,.06); }
    .main { flex:1; overflow-y:auto; background:var(--bg); min-width:0; }
    .main-header { background:rgba(255,255,255,.88); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px); border-bottom:1px solid rgba(210,210,215,.6); padding:.85rem 1.5rem; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
    .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; }
    .stat-card { background:#fff; border-radius:var(--radius); padding:1.25rem; box-shadow:var(--shadow); }
    .stat-label { font-size:.8rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
    .stat-value { font-size:1.75rem; font-weight:800; margin:.4rem 0; }
    .stat-sub { font-size:.8rem; color:var(--muted); }
    @media(max-width:900px){ .stat-grid{grid-template-columns:repeat(2,1fr);} .sidebar{display:none;} }
  </style>

<div class="main">
  <div class="main-header">
    <h1 style="font-size:1.1rem;font-weight:700">取貨 / 配送設定</h1>
    <button class="btn btn-primary btn-sm" onclick="openAddOption()">＋ 新增取貨方式</button>
  </div>
  <div style="padding:1.5rem;display:flex;flex-direction:column;gap:1.5rem">

    <!-- 取貨方式列表 -->
    <div class="card">
      <h3 style="font-weight:700;margin-bottom:1rem">取貨方式管理</h3>
      <div id="option-list"><div class="spinner" style="display:block;margin:auto"></div></div>
      <div id="save-alert"></div>
      <button class="btn btn-primary" style="margin-top:1rem" onclick="saveOptions()">儲存設定</button>
    </div>

    <!-- 超商店取說明 -->
    <div class="card">
      <h3 style="font-weight:700;margin-bottom:.5rem">🏪 超商店取說明</h3>
      <p style="font-size:.9rem;color:var(--muted);margin-bottom:1rem">
        結帳時消費者可選擇超商取貨，並自行填寫門市資訊。若需串接物流 API 自動選店，請洽 IT 工程師進行後端整合。
      </p>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem">
        <div style="text-align:center;padding:.75rem;border:1.5px solid var(--border);border-radius:8px">
          <div style="font-size:1.5rem;margin-bottom:.25rem">🟢</div>
          <div style="font-size:.85rem;font-weight:600">7-ELEVEN</div>
        </div>
        <div style="text-align:center;padding:.75rem;border:1.5px solid var(--border);border-radius:8px">
          <div style="font-size:1.5rem;margin-bottom:.25rem">🔵</div>
          <div style="font-size:.85rem;font-weight:600">全家</div>
        </div>
        <div style="text-align:center;padding:.75rem;border:1.5px solid var(--border);border-radius:8px">
          <div style="font-size:1.5rem;margin-bottom:.25rem">🔴</div>
          <div style="font-size:.85rem;font-weight:600">萊爾富</div>
        </div>
        <div style="text-align:center;padding:.75rem;border:1.5px solid var(--border);border-radius:8px">
          <div style="font-size:1.5rem;margin-bottom:.25rem">🟡</div>
          <div style="font-size:.85rem;font-weight:600">OK mart</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- 新增取貨方式 Modal -->
<div class="modal-overlay" id="add-modal" style="display:none">
  <div class="modal-box">
    <button class="modal-close" onclick="closeAddModal()">✕</button>
    <h3 class="modal-title">新增取貨方式</h3>
    <div class="form-group">
      <label class="form-label">名稱 *</label>
      <input id="opt-label" type="text" class="form-input" placeholder="例：超商店取、宅配到府">
    </div>
    <div class="form-group">
      <label class="form-label">類型 *</label>
      <select id="opt-type" class="form-select">
        <option value="cvs">超商店取</option>
        <option value="home">宅配到府</option>
        <option value="other">其他</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">運費（NT$）*</label>
      <input id="opt-fee" type="number" class="form-input" min="0" placeholder="60">
    </div>
    <div style="display:flex;gap:.75rem">
      <button class="btn btn-outline" onclick="closeAddModal()">取消</button>
      <button class="btn btn-primary" style="flex:1" onclick="addOption()">新增</button>
    </div>
  </div>
</div>

  projectId: "reyi-ep",

  <script src="../js/app-helpers.js"></script>
<script>
let options = [];

auth.onAuthStateChanged(async user => {
  if (!user) return window.location.href = '../index.html';
  const doc = await db.collection('admins').doc(user.uid).get();
  if (!doc.exists) return window.location.href = '../shop.html';
  applyStoreName(' — 管理後台');
  loadOptions();
});

async function loadOptions() {
  try {
    const snap = await db.collection('settings').doc('shipping').get();
    options = snap.exists ? (snap.data().options || []) : defaultOptions();
  } catch { options = defaultOptions(); }
  renderOptions();
}

function defaultOptions() {
  return [
    { id: 'cvs', label: '超商店取', fee: 60, type: 'cvs', enabled: true },
    { id: 'home', label: '宅配到府', fee: 100, type: 'home', enabled: true }
  ];
}

function renderOptions() {
  const el = document.getElementById('option-list');
  el.innerHTML = options.map((opt, i) => `
    <div style="display:flex;align-items:center;gap:1rem;padding:.75rem;border:1.5px solid var(--border);border-radius:10px;margin-bottom:.6rem;flex-wrap:wrap">
      <div style="flex:1;min-width:160px">
        <div style="font-weight:600">${opt.label}</div>
        <div style="font-size:.8rem;color:var(--muted)">${opt.type === 'cvs' ? '超商店取' : opt.type === 'home' ? '宅配到府' : '其他'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem">
        <span style="font-size:.85rem;color:var(--muted)">運費</span>
        <input type="number" value="${opt.fee}" min="0" style="width:90px" class="form-input"
          onchange="options[${i}].fee=parseInt(this.value)||0">
      </div>
      <label style="display:flex;align-items:center;gap:.4rem;font-size:.85rem;cursor:pointer">
        <input type="checkbox" ${opt.enabled?'checked':''} onchange="options[${i}].enabled=this.checked">
        啟用
      </label>
      <button class="btn btn-danger btn-sm" onclick="removeOption(${i})">刪除</button>
    </div>`).join('') || '<p style="color:var(--muted);font-size:.9rem">尚未設定取貨方式</p>';
}

function removeOption(i) {
  options.splice(i, 1);
  renderOptions();
}

async function saveOptions() {
  const alertEl = document.getElementById('save-alert');
  try {
    await db.collection('settings').doc('shipping').set({ options, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    alertEl.innerHTML = '<div class="alert alert-success">設定已儲存</div>';
    setTimeout(() => alertEl.innerHTML = '', 3000);
  } catch(e) {
    alertEl.innerHTML = `<div class="alert alert-error">儲存失敗：${e.message}</div>`;
  }
}

function openAddOption() { document.getElementById('add-modal').style.display = 'flex'; }
function closeAddModal() { document.getElementById('add-modal').style.display = 'none'; }

function addOption() {
  const label = document.getElementById('opt-label').value.trim();
  const fee = parseInt(document.getElementById('opt-fee').value) || 0;
  const type = document.getElementById('opt-type').value;
  if (!label) { alert('請填寫取貨方式名稱'); return; }
  options.push({ id: Date.now().toString(), label, fee, type, enabled: true });
  renderOptions();
  closeAddModal();
}

function doLogout() { auth.signOut().then(() => window.location.href = '../index.html'); }
</script>
