<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reyi-EP — 結帳</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
.s-header{background:rgba(255,255,255,.88);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid rgba(210,210,215,.6);position:sticky;top:0;z-index:200}
.s-header-inner{max-width:1280px;margin:auto;padding:.8rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1.5rem}
.s-logo{font-size:1.35rem;font-weight:800;color:#1d1d1f;letter-spacing:-.04em;flex-shrink:0}
.s-nav a{font-size:.85rem;color:#6e6e73;text-decoration:none;padding:.35rem .6rem;border-radius:8px;transition:color .15s,background .15s}
.s-nav a:hover{color:#1d1d1f;background:rgba(0,0,0,.04)}
.emp-info-row{display:flex;align-items:center;gap:.5rem;padding:.55rem 0;border-bottom:1px solid var(--border)}
.emp-info-row:last-child{border-bottom:none}
.emp-info-label{font-size:.82rem;color:var(--muted);width:72px;flex-shrink:0}
.emp-info-value{font-weight:600;font-size:.95rem}
.order-item-row{display:flex;align-items:center;gap:.75rem;padding:.6rem 0;border-bottom:1px solid var(--border)}
.order-item-row:last-child{border-bottom:none}
.qr-wrap{background:#fff;border:1px solid var(--border);border-radius:16px;padding:1.5rem;display:inline-block;box-shadow:0 4px 24px rgba(0,0,0,.08)}
@media(max-width:600px){.s-header-inner{padding:.65rem 1rem}}
  </style>
  <style>body{visibility:hidden}</style>
  <script src="js/store-name-init.js"></script>
</head>
<body>

<header class="s-header">
  <div class="s-header-inner">
    <a href="shop.html" class="s-logo store-name-el"></a>
    <nav class="s-nav">
      <a href="cart.html">← 返回購物車</a>
      <a href="admin/index.html" id="nav-admin" style="display:none;background:rgba(0,102,204,.1);color:#0066cc;border-radius:8px;padding:.35rem .75rem;font-weight:600;font-size:.82rem">⚙️ 後台管理</a>
    </nav>
  </div>
</header>

<div class="container" style="max-width:560px">

  <!-- 確認訂單 -->
  <div id="step-confirm">
    <h1 class="page-title">確認訂單</h1>

    <div class="card" style="margin-bottom:1rem">
      <h3 style="font-weight:700;margin-bottom:.75rem">員工資訊</h3>
      <div id="emp-loading" style="color:var(--muted);font-size:.88rem">載入員工資料中...</div>
      <div id="emp-body" style="display:none">
        <div class="emp-info-row"><span class="emp-info-label">廠商</span><span class="emp-info-value" id="info-dept"></span></div>
        <div class="emp-info-row"><span class="emp-info-label">姓名</span><span class="emp-info-value" id="info-name"></span></div>
        <div class="emp-info-row"><span class="emp-info-label">員工編號</span><span class="emp-info-value" id="info-empid"></span></div>
      </div>
    </div>

    <div class="card" style="margin-bottom:1rem">
      <h3 style="font-weight:700;margin-bottom:.75rem">訂購商品</h3>
      <div id="order-items"></div>
    </div>

    <div class="card summary-box" style="margin-bottom:1.5rem">
      <div class="summary-row total"><span>商品合計</span><span id="order-total">NT$ 0</span></div>
    </div>

    <div id="submit-alert"></div>
    <button class="btn btn-primary btn-full" onclick="submitOrder()" id="btn-submit">確認下單</button>
  </div>

  <!-- 訂單完成 + QR 碼 -->
  <div id="step-done" style="display:none;text-align:center;padding:2rem 0">
    <div style="font-size:3.5rem;margin-bottom:.75rem">✅</div>
    <h2 style="font-weight:800;margin-bottom:.4rem">訂單已成立！</h2>
    <p style="color:var(--muted);margin-bottom:.25rem;font-size:.9rem">訂單編號：<strong id="order-id-display" style="color:#1d1d1f"></strong></p>
    <p style="color:var(--muted);font-size:.85rem;margin-bottom:1.75rem">請出示下方 QR 碼讓管理員掃描確認付款</p>
    <div style="display:flex;justify-content:center;margin-bottom:1.75rem">
      <div class="qr-wrap">
        <img id="qr-img" style="width:220px;height:220px;display:block">
        <p style="margin-top:.75rem;font-size:.75rem;color:var(--muted);letter-spacing:.05em" id="qr-order-short"></p>
      </div>
    </div>
    <a href="shop.html" class="btn btn-primary">繼續購物</a>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyByVQewloZcL4cMrPKxyZ5JlhaGS4Zep08",
  authDomain: "reyi-ep.firebaseapp.com",
  projectId: "reyi-ep",
  storageBucket: "reyi-ep.firebasestorage.app",
  messagingSenderId: "90799325656",
  appId: "1:90799325656:web:df2ce64d86ef9c9060b2ad"
};
firebase.initializeApp(firebaseConfig);
</script>
<script src="js/app-helpers.js"></script>
<script src="js/cart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script>
let currentUser = null;
let empInfo = null;

auth.onAuthStateChanged(async user => {
  document.body.style.visibility = 'visible';
  if (!user) return window.location.href = 'index.html';
  currentUser = user;
  setCartUser(user.uid);
  applyStoreName('');
  const adminDoc = await db.collection('admins').doc(user.uid).get().catch(() => null);
  document.getElementById('nav-admin').style.display = adminDoc?.exists ? '' : 'none';
  if (!getCart().length) return window.location.href = 'cart.html';
  renderItems();
  loadEmpInfo();
});

async function loadEmpInfo() {
  const empId = currentUser.email.replace('@reyi-ep.local', '').toUpperCase();
  try {
    const doc = await db.collection('employees').doc(empId).get();
    empInfo = { empId, name: empId, vendor: '', dept: '' };
    if (doc.exists) {
      const d = doc.data();
      empInfo.name   = d.name   || empId;
      empInfo.vendor = d.vendor || '';
      empInfo.dept   = d.dept   || '';
    }
  } catch(e) {
    empInfo = { empId, name: currentUser.displayName || empId, vendor: '', dept: '' };
  }
  document.getElementById('info-dept').textContent = empInfo.vendor || '—';
  document.getElementById('info-name').textContent = empInfo.name;
  document.getElementById('info-empid').textContent = empInfo.empId;
  document.getElementById('emp-loading').style.display = 'none';
  document.getElementById('emp-body').style.display = 'block';
}

function renderItems() {
  const cart = getCart();
  const total = getCartTotal();
  document.getElementById('order-items').innerHTML = cart.map(i => `
    <div class="order-item-row">
      <div style="width:44px;height:44px;border-radius:8px;background:#f5f5f7;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:.9rem">
        ${i.imageUrl ? `<img src="${safeImgSrc(i.imageUrl)}" style="width:100%;height:100%;object-fit:cover">` : '📦'}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(i.name)}</div>
        ${i.variantName ? `<div style="font-size:.76rem;color:var(--muted)">樣式：${escapeHtml(i.variantName)}</div>` : ''}
        <div style="font-size:.8rem;color:var(--muted)">${formatPrice(i.price)} × ${i.qty}</div>
      </div>
      <div style="font-weight:700;flex-shrink:0">${formatPrice(i.price * i.qty)}</div>
    </div>`).join('');
  document.getElementById('order-total').textContent = formatPrice(total);
}

async function submitOrder() {
  const btn = document.getElementById('btn-submit');
  const alertEl = document.getElementById('submit-alert');
  if (!empInfo) {
    alertEl.innerHTML = '<div class="alert alert-error">員工資料載入中，請稍候再試</div>';
    return;
  }
  btn.disabled = true; btn.textContent = '處理中...';
  alertEl.innerHTML = '';
  try {
    const cart = getCart();
    const subtotal = getCartTotal();
    const orderData = {
      userId: currentUser.uid,
      empId: empInfo.empId,
      empName: empInfo.name,
      empVendor: empInfo.vendor,
      empDept: empInfo.dept,
      items: cart.map(i => ({
        id: i.id,
        name: i.name,
        variantId: i.variantId || '',
        variantName: i.variantName || '',
        imageUrl: i.imageUrl || '',
        price: i.price,
        qty: i.qty
      })),
      subtotal,
      total: subtotal,
      status: 'pending',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    const ref = await db.collection('orders').add(orderData);
    // 更新庫存
    const batch = db.batch();
    cart.forEach(item => {
      batch.update(db.collection('products').doc(item.id), {
        stock: firebase.firestore.FieldValue.increment(-item.qty)
      });
    });
    await batch.commit().catch(() => {});
    clearCart();
    showDone(ref.id);
  } catch(e) {
    alertEl.innerHTML = `<div class="alert alert-error">下單失敗：${escapeHtml(e.message)}</div>`;
    btn.disabled = false; btn.textContent = '確認下單';
  }
}

function showDone(orderId) {
  document.getElementById('step-confirm').style.display = 'none';
  document.getElementById('step-done').style.display = 'block';
  document.getElementById('order-id-display').textContent = orderId.slice(0, 8).toUpperCase();
  document.getElementById('qr-order-short').textContent = 'ORDER ' + orderId.slice(0, 8).toUpperCase();
  const qrUrl = window.location.origin + '/admin/order-detail.html?id=' + orderId;
  try {
    const qr = qrcode(0, 'M');
    qr.addData(qrUrl);
    qr.make();
    document.getElementById('qr-img').src = qr.createDataURL(5, 0);
  } catch(e) {
    document.getElementById('qr-img').alt = 'QR 碼產生失敗：' + e.message;
  }
}
</script>
</body>
</html>
